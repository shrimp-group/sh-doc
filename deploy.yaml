
apiVersion: apps/v1
kind: Deployment
metadata:
  # namespace: prod
  name: sh-doc-ui
  labels:
    app: sh-doc-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sh-doc-ui
  # 发布策略-平滑发布
  strategy:
    # type: Recreate
    type: RollingUpdate # 资源不足，不能用滚动方式
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app: sh-doc-ui
    spec:
      imagePullSecrets:
        # 阿里云 Secrets
        - name: aliyun
      containers:
        - name: sh-doc-ui
          # 镜像， flow 会替换此变量
          image: ${IMAGE}
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  # namespace: prod
  name: sh-doc-ui-svc
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http-80
  selector:
    app: sh-doc-ui

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  # namespace: prod
  name: sh-doc-ui-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: doc.husters.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sh-doc-ui-svc
                port:
                  number: 80
  tls:
    - hosts:
        - doc.husters.cn
      secretName: doc.husters.cn

